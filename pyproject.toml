[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# pyflakes (F) catches real bugs (unused imports/names); a subset of pycodestyle
# (E) for obvious style. Line-length + a few noisy rules are off on purpose to
# keep the existing hand-tuned formatting.
select = ["F", "E9", "W6"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
